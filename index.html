<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mich &amp; Neto — Song Book</title>
<style>
  :root {
    --bg: #14161a;
    --panel: #1d2026;
    --panel-2: #23262d;
    --text: #eef0f3;
    --muted: #9aa1ac;
    --accent: #e0a63e;
    --chord: #6bc7a8;
    --border: #2d3038;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
  }
  #sidebar {
    width: 300px;
    min-width: 220px;
    background: var(--panel);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    padding: 16px;
  }
  #sidebar h1 {
    font-size: 18px;
    margin: 0 0 12px 0;
    color: var(--accent);
  }
  #search {
    width: 100%;
    padding: 10px 12px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--panel-2);
    color: var(--text);
    font-size: 14px;
    margin-bottom: 12px;
  }
  #search:focus { outline: 1px solid var(--accent); }
  #song-list {
    flex: 1;
    overflow-y: auto;
    list-style: none;
    margin: 0;
    padding: 0;
  }
  #song-list li {
    padding: 10px 12px;
    border-radius: 8px;
    cursor: pointer;
    margin-bottom: 4px;
  }
  #song-list li:hover { background: var(--panel-2); }
  #song-list li.active { background: var(--accent); color: #1a1a1a; }
  #song-list .title { font-weight: 600; font-size: 14px; }
  #song-list .artist { font-size: 12px; color: var(--muted); }
  #song-list li.active .artist { color: #3a3a3a; }
  #empty-list {
    color: var(--muted);
    font-size: 13px;
    padding: 8px 12px;
  }

  #main {
    flex: 1;
    display: flex;
    flex-direction: column;
    min-width: 0;
  }
  #toolbar {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 14px 24px;
    border-bottom: 1px solid var(--border);
    background: var(--panel);
    flex-wrap: wrap;
  }
  #toolbar h2 { margin: 0; font-size: 20px; }
  #toolbar .artist-name { color: var(--muted); font-size: 14px; margin-left: 4px; }
  .spacer { flex: 1; }
  .ctrl-group {
    display: flex;
    align-items: center;
    gap: 6px;
    background: var(--panel-2);
    border-radius: 8px;
    padding: 4px 8px;
  }
  .ctrl-group label { font-size: 12px; color: var(--muted); margin-right: 4px; }
  button.ctrl {
    background: var(--panel-2);
    border: 1px solid var(--border);
    color: var(--text);
    width: 30px;
    height: 30px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 15px;
  }
  button.ctrl:hover { border-color: var(--accent); color: var(--accent); }
  #key-display, #size-display {
    min-width: 34px;
    text-align: center;
    font-size: 13px;
    color: var(--text);
  }
  #reset-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    border-radius: 6px;
    padding: 6px 10px;
    font-size: 12px;
    cursor: pointer;
  }
  #reset-btn:hover { color: var(--text); border-color: var(--accent); }

  #song-view {
    flex: 1;
    overflow: auto;
    padding: 24px 32px 60px;
  }
  #chord-sheet {
    font-family: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
    white-space: pre;
    line-height: 1.5;
    font-size: 17px;
    max-width: 900px;
  }
  .section-label {
    color: var(--accent);
    font-weight: bold;
  }
  .chord-line {
    color: var(--chord);
    font-weight: bold;
  }
  #placeholder {
    color: var(--muted);
    padding: 40px;
    font-size: 15px;
  }
  #song-meta {
    color: var(--muted);
    font-size: 12px;
    margin-top: -4px;
  }
  #back-btn {
    display: none;
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    border-radius: 6px;
    padding: 6px 10px;
    font-size: 16px;
    cursor: pointer;
    margin-right: 10px;
  }
  #back-btn:hover { color: var(--text); border-color: var(--accent); }

  /* ---------- Mobile layout ---------- */
  @media (max-width: 700px) {
    body { position: relative; overflow: hidden; height: 100vh; }
    #sidebar, #main {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      width: 100%;
    }
    #sidebar { z-index: 2; }
    #main { z-index: 1; display: none; }
    body.song-open #sidebar { display: none; }
    body.song-open #main { display: flex; }
    #back-btn { display: inline-flex; }
    #search { font-size: 16px; padding: 12px 12px; } /* 16px avoids iOS auto-zoom on focus */
    #song-list li { padding: 14px 12px; font-size: 15px; }
    #toolbar { padding: 10px 14px; gap: 8px; }
    #toolbar h2 { font-size: 17px; }
    button.ctrl { width: 38px; height: 38px; font-size: 17px; }
    #reset-btn { padding: 8px 12px; font-size: 13px; }
    #song-view { padding: 16px 16px 50px; }
    #chord-sheet { font-size: 15px; }
  }
</style>
</head>
<body>

<div id="sidebar">
  <h1>Mich &amp; Neto — Song Book</h1>
  <input id="search" type="text" placeholder="Search song or artist...">
  <ul id="song-list"></ul>
</div>

<div id="main">
  <div id="toolbar" style="display:none;">
    <button id="back-btn" title="Back to list">&larr;</button>
    <div>
      <h2 id="song-title"></h2>
      <div id="song-meta"></div>
    </div>
    <div class="spacer"></div>
    <div class="ctrl-group">
      <label>Transpose</label>
      <button class="ctrl" id="transpose-down">−</button>
      <span id="key-display"></span>
      <button class="ctrl" id="transpose-up">+</button>
    </div>
    <div class="ctrl-group">
      <label>Text size</label>
      <button class="ctrl" id="size-down">−</button>
      <span id="size-display"></span>
      <button class="ctrl" id="size-up">+</button>
    </div>
    <button id="reset-btn">Reset</button>
  </div>
  <div id="song-view">
    <div id="placeholder">Select a song from the list to view lyrics and chords.</div>
    <pre id="chord-sheet" style="display:none;"></pre>
  </div>
</div>

<script src="songs.js"></script>
<script>
// ---------- Chord transposition ----------
const NOTES = ['A','A#','B','C','C#','D','D#','E','F','F#','G','G#'];
const FLAT_MAP = {'Ab':'G#','Bb':'A#','Cb':'B','Db':'C#','Eb':'D#','Fb':'E','Gb':'F#'};
const CHORD_TOKEN_RE = /^[A-G](#|b)?(maj|min|m|sus2|sus4|sus|dim|aug|add\d{1,2})?\d{0,2}(\/[A-G](#|b)?)?$/;

function shiftNote(note, semis) {
  const normalized = FLAT_MAP[note] || note;
  const idx = NOTES.indexOf(normalized);
  if (idx === -1) return note;
  const newIdx = ((idx + semis) % 12 + 12) % 12;
  return NOTES[newIdx];
}

function transposeChord(chord, semis) {
  if (semis === 0) return chord;
  const parts = chord.split('/');
  const main = parts[0];
  const bass = parts[1];
  const rootMatch = main.match(/^[A-G](#|b)?/);
  if (!rootMatch) return chord;
  const root = rootMatch[0];
  const suffix = main.slice(root.length);
  const newRoot = shiftNote(root, semis);
  let result = newRoot + suffix;
  if (bass) result += '/' + shiftNote(bass, semis);
  return result;
}

function isChordLine(line) {
  const trimmed = line.trim();
  if (!trimmed) return false;
  const tokens = trimmed.split(/\s+/);
  return tokens.every(t => CHORD_TOKEN_RE.test(t));
}

function isSectionLabel(line) {
  return /^\s*\[.*\]\s*$/.test(line);
}

function transposeLine(line, semis) {
  return line.replace(/(\S+)/g, tok => CHORD_TOKEN_RE.test(tok) ? transposeChord(tok, semis) : tok);
}

function transposeBody(body, semis) {
  return body.split('\n').map(line => isChordLine(line) ? transposeLine(line, semis) : line).join('\n');
}

// ---------- App state ----------
let currentSong = null;
let semitoneOffset = 0;
let fontSize = 17;

const listEl = document.getElementById('song-list');
const searchEl = document.getElementById('search');
const toolbarEl = document.getElementById('toolbar');
const titleEl = document.getElementById('song-title');
const metaEl = document.getElementById('song-meta');
const keyDisplayEl = document.getElementById('key-display');
const sizeDisplayEl = document.getElementById('size-display');
const sheetEl = document.getElementById('chord-sheet');
const placeholderEl = document.getElementById('placeholder');

function renderList(filter) {
  const q = (filter || '').trim().toLowerCase();
  const filtered = SONGS.filter(s =>
    !q || s.title.toLowerCase().includes(q) || s.artist.toLowerCase().includes(q)
  );
  listEl.innerHTML = '';
  if (filtered.length === 0) {
    const li = document.createElement('li');
    li.id = 'empty-list';
    li.textContent = 'No songs found.';
    li.style.cursor = 'default';
    listEl.appendChild(li);
    return;
  }
  filtered.sort((a, b) => a.title.localeCompare(b.title));
  filtered.forEach(song => {
    const li = document.createElement('li');
    li.className = currentSong && currentSong.id === song.id ? 'active' : '';
    li.innerHTML = `<div class="title">${song.title}</div><div class="artist">${song.artist}</div>`;
    li.addEventListener('click', () => selectSong(song.id));
    listEl.appendChild(li);
  });
}

function selectSong(id) {
  const song = SONGS.find(s => s.id === id);
  if (!song) return;
  currentSong = song;
  semitoneOffset = 0;
  renderList(searchEl.value);
  renderSong();
  document.body.classList.add('song-open');
}

function currentKeyLabel() {
  if (!currentSong) return '';
  return transposeChord(currentSong.key, semitoneOffset);
}

function renderSong() {
  if (!currentSong) return;
  toolbarEl.style.display = 'flex';
  placeholderEl.style.display = 'none';
  sheetEl.style.display = 'block';

  titleEl.textContent = currentSong.title;
  metaEl.textContent = currentSong.artist + (currentSong.capo ? ` · Capo ${currentSong.capo}` : '');
  keyDisplayEl.textContent = currentKeyLabel();
  sizeDisplayEl.textContent = fontSize + 'px';
  sheetEl.style.fontSize = fontSize + 'px';

  const transposed = transposeBody(currentSong.body, semitoneOffset);
  sheetEl.innerHTML = '';
  transposed.split('\n').forEach((line, i) => {
    const div = document.createElement('div');
    if (isSectionLabel(line)) {
      div.className = 'section-label';
      div.textContent = line;
    } else if (isChordLine(line)) {
      div.className = 'chord-line';
      div.textContent = line;
    } else {
      div.textContent = line.length ? line : ' ';
    }
    sheetEl.appendChild(div);
  });
}

searchEl.addEventListener('input', () => renderList(searchEl.value));

document.getElementById('back-btn').addEventListener('click', () => {
  document.body.classList.remove('song-open');
});

document.getElementById('transpose-up').addEventListener('click', () => {
  if (!currentSong) return;
  semitoneOffset++;
  renderSong();
});
document.getElementById('transpose-down').addEventListener('click', () => {
  if (!currentSong) return;
  semitoneOffset--;
  renderSong();
});
document.getElementById('reset-btn').addEventListener('click', () => {
  if (!currentSong) return;
  semitoneOffset = 0;
  renderSong();
});
document.getElementById('size-up').addEventListener('click', () => {
  fontSize = Math.min(fontSize + 1, 32);
  renderSong();
});
document.getElementById('size-down').addEventListener('click', () => {
  fontSize = Math.max(fontSize - 1, 11);
  renderSong();
});

renderList('');
</script>
</body>
</html>
